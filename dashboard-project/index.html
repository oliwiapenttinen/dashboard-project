<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>System Dashboard</h1>
<p class="subtitle">Live system monitoring (mock data)</p>

    <div class="grid">
     <div class="card">
     <h2>Status</h2>
     <p id="status">OK</p>
     </div>

     <div class="card">
     <h2>Users</h2>
     <p id="users">1200</p>
     </div>

     <div class="card">
     <h2>Error rate</h2>
     <p id="error">2%</p>
     </div>

     <div class="card">
     <h2>Load</h2>
     <p id="load">Normal</p>
     </div>

    </div>

    <button onclick="refresh()">Refresh data</button>

    <ul id="logs"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
